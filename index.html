<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旭日營 2026 — 與好友同樂，結識新圈子</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500&family=Playfair+Display:ital,wght@0,900;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --sun: #F5A623;
    --dawn: #FF6B35;
    --sky: #FFD166;
    --earth: #3D2B1F;
    --cream: #FFF8EE;
    --sage: #8B9D77;
    --mist: #E8D5B7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--cream);
    color: var(--earth);
    font-family: 'Noto Sans TC', sans-serif;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 16px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.3s, backdrop-filter 0.3s;
  }
  nav.scrolled {
    background: rgba(61,27,10,0.9);
    backdrop-filter: blur(12px);
  }
  .nav-logo {
    font-family: 'Noto Serif TC', serif;
    font-weight: 900;
    font-size: 20px;
    color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  .nav-links {
    display: flex;
    gap: 24px;
    list-style: none;
  }
  .nav-links a {
    color: rgba(255,255,255,0.8);
    text-decoration: none;
    font-size: 14px;
    font-weight: 400;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--sky); }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    background: linear-gradient(160deg, #1a0a00 0%, #3D1A00 30%, #7A3000 55%, #F5A623 80%, #FFD166 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: 60px 24px;
  }
  .rays {
    position: absolute;
    bottom: -10%;
    left: 50%;
    transform: translateX(-50%);
    width: 160vw;
    height: 160vw;
    background: conic-gradient(from -90deg, transparent 0deg, rgba(255,209,102,0.12) 3deg, transparent 6deg, transparent 10deg, rgba(255,209,102,0.08) 13deg, transparent 16deg, transparent 20deg, rgba(255,209,102,0.14) 23deg, transparent 26deg, transparent 180deg);
    animation: rotateRays 60s linear infinite;
    pointer-events: none;
  }
  @keyframes rotateRays { to { transform: translateX(-50%) rotate(360deg); } }

  .hero-badge {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,209,102,0.5);
    color: var(--sky);
    font-size: 12px;
    letter-spacing: 4px;
    padding: 7px 20px;
    border-radius: 999px;
    text-transform: uppercase;
    margin-bottom: 28px;
    backdrop-filter: blur(8px);
    z-index: 2;
  }
  .hero-title {
    font-family: 'Noto Serif TC', serif;
    font-weight: 900;
    font-size: clamp(72px, 18vw, 160px);
    line-height: 0.9;
    color: #fff;
    text-align: center;
    text-shadow: 0 4px 40px rgba(245,166,35,0.4);
    position: relative;
    z-index: 2;
  }
  .hero-title span { color: var(--sky); }
  .hero-sub {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(16px, 3vw, 22px);
    color: rgba(255,255,255,0.75);
    margin-top: 20px;
    text-align: center;
    z-index: 2;
  }
  .hero-meta {
    display: flex;
    gap: 32px;
    margin-top: 48px;
    z-index: 2;
    flex-wrap: wrap;
    justify-content: center;
  }
  .meta-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .meta-label { font-size: 11px; letter-spacing: 3px; color: rgba(255,255,255,0.5); text-transform: uppercase; }
  .meta-value { font-family: 'Noto Serif TC', serif; font-size: 18px; font-weight: 700; color: #fff; }

  /* ── FORM SECTION ── */
  .form-section {
    background: linear-gradient(160deg, #FFE8CC 0%, var(--cream) 100%);
    padding: 100px 24px;
    position: relative;
    overflow: hidden;
  }
  .form-inner { max-width: 660px; margin: 0 auto; position: relative; z-index: 1; }
  .form-card {
    background: #fff;
    border-radius: 28px;
    padding: 52px 48px;
    box-shadow: 0 8px 48px rgba(61,43,31,0.1);
    margin-top: 48px;
    position: relative;
    overflow: hidden;
  }
  .form-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--dawn), var(--sun), var(--sky));
  }
  .submit-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, var(--dawn), var(--sun));
    color: #fff;
    border: none;
    border-radius: 14px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(255,107,53,0.35);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(255,107,53,0.45);
  }
  .success-state { display: none; text-align: center; padding: 20px 0; }
  .success-state.show { display: block; }
  .form-form.hidden { display: none; }
  .success-emoji { font-size: 56px; margin-bottom: 20px; }
  .google-form-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #4285f4;
    color: #fff;
    font-size: 16px;
    font-weight: 500;
    padding: 14px 28px;
    border-radius: 999px;
    text-decoration: none;
    margin-top: 20px;
  }

  footer {
    background: var(--earth);
    color: rgba(255,255,255,0.5);
    text-align: center;
    padding: 40px 24px;
    font-size: 13px;
  }
  @media (max-width: 680px) { .form-card { padding: 36px 24px; } }
</style>
</head>
<body>

<nav id="nav">
  <div class="nav-logo">旭日營 ☀️</div>
  <ul class="nav-links">
    <li><a href="#signup">立即報名</a></li>
  </ul>
</nav>

<section class="hero">
  <div class="rays"></div>
  <div class="hero-badge">✦ 新東扶青社 × 旭日營 2026 ✦</div>
  <h1 class="hero-title">旭<span>日</span>營</h1>
  <p class="hero-sub">暫別城市喧囂，與好友共迎宜蘭的日出</p>
  <div class="hero-meta">
    <div class="meta-item"><span class="meta-label">日期</span><span class="meta-value">6月6日 — 6月7日</span></div>
    <div class="meta-item"><span class="meta-label">地點</span><span class="meta-value">宜蘭包棟民宿</span></div>
  </div>
</section>

<section class="form-section" id="signup">
  <div class="form-inner">
    <div style="text-align:center;">
      <p style="font-size:11px; letter-spacing:5px; color:var(--dawn); text-transform:uppercase; font-weight:700;">✦ 報名通道</p>
      <h2 style="font-family:'Noto Serif TC',serif; font-size:32px; margin-top:10px;">準備好出發了嗎？</h2>
    </div>

    <div class="form-card">
      <!-- 原有的表單欄位保留，僅簡化 CSS 並聚焦於送出功能 -->
      <form class="form-form" id="regForm">
        <p style="text-align:center; color:#7A5C45; margin-bottom:30px; line-height:1.6;">請點擊下方按鈕前往 Google 表單完成報名。<br>我們將在表單中收集詳細資訊。</p>
        
        <button type="submit" class="submit-btn">✨ 前往 Google 表單報名</button>
        
        <p style="font-size:12px; color:#9A7A65; text-align:center; margin-top:20px;">
          點擊後將會在新分頁開啟表單<br>如有問題請私訊新東扶青社官方帳號
        </p>
      </form>

      <!-- 成功畫面 -->
      <div class="success-state" id="successState">
        <div class="success-emoji">🌅</div>
        <h3 style="font-size:24px; margin-bottom:10px;">請在跳出的分頁完成填寫</h3>
        <p style="color:#7A5C45; line-height:1.8;">
          如果表單沒有自動開啟，請點擊下方按鈕：
        </p>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLScX_5T5drkpErlQCh-zVC-c38tuWBOXdbpzvtqnWGjOyS_JJw/viewform" target="_blank" class="google-form-link" id="finalBtn">
          📋 點我開啟報名表單
        </a>
      </div>
    </div>
  </div>
</section>

<footer>
  <p><strong>旭日營 2026</strong></p>
  <p>主辦：新東扶青社 Rotaract Club</p>
  <p style="margin-top:8px;">Made with ☀️ by 新東扶青社</p>
</footer>

<script>
  // 導航列滾動效果
  window.addEventListener('scroll', () => {
    document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 60);
  });

  // 表單送出功能
  document.getElementById('regForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const targetUrl = "https://docs.google.com/forms/d/e/1FAIpQLScX_5T5drkpErlQCh-zVC-c38tuWBOXdbpzvtqnWGjOyS_JJw/viewform";

    // 1. 顯示成功/導引畫面
    document.querySelector('.form-form').classList.add('hidden');
    document.getElementById('successState').classList.add('show');

    // 2. 自動開啟新分頁跳轉到 Google 表單
    window.open(targetUrl, "_blank");
  });
</script>
</body>
</html>
